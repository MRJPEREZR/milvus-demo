services:
  notebook-milvus:
    image: jupyter-milvus-test
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notebook-milvus
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: yes
    env_file:
      - .env
    volumes:
      - ./examples:/home/jovyan/examples
      - ./milvus_docs:/home/jovyan/milvus_docs
    command: start-notebook.py --NotebookApp.token='' 